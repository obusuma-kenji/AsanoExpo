<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Metaverse</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Metaverse</div>
      </div>
    </div>

    <!-- ===== 画面外の常設CTAボタン ===== -->
    <div id="external-cta-buttons" style="text-align:center; margin:20px auto 30px;">
      <button
        onclick="openEndstateNavi()"
        style="font-size:18px; padding:14px 28px; margin:8px; background:#1f63d6; color:white; border:none; border-radius:8px; cursor:pointer;">
        詳しくはこちら（別タブで開く）
      </button>
    </div>
    <!-- ===== ここまで ===== -->

    <script>
      var canvas = document.querySelector("#unity-canvas");

      // ===== 外部CTA：endstate-navi.com を別タブで開く =====
      window.openEndstateNavi = function () {
        window.open(
          "https://endstate-navi.com/",
          "_blank",
          "noopener,noreferrer"
        );
      };
      // ===== ここまで =====

      // ===== LPオーバーレイ表示機能 =====
      window.ShowAsanoLpOverlay = function (url) {
        var existing = document.getElementById("asano-lp-overlay");
        if (existing) { existing.remove(); }
        var overlay = document.createElement("div");
        overlay.id = "asano-lp-overlay";
        overlay.style.position = "fixed";
        overlay.style.left = "0";
        overlay.style.top = "0";
        overlay.style.width = "100vw";
        overlay.style.height = "100vh";
        overlay.style.zIndex = "999999";
        overlay.style.background = "rgba(0,0,0,0.75)";
        overlay.style.display = "flex";
        overlay.style.alignItems = "center";
        overlay.style.justifyContent = "center";
        var frameWrap = document.createElement("div");
        frameWrap.style.position = "relative";
        frameWrap.style.width = "92vw";
        frameWrap.style.height = "88vh";
        frameWrap.style.background = "#ffffff";
        frameWrap.style.border = "4px solid #d4af37";
        frameWrap.style.boxShadow = "0 0 30px rgba(0,0,0,0.65)";
        frameWrap.style.borderRadius = "8px";
        frameWrap.style.overflow = "hidden";
        var closeButton = document.createElement("button");
        closeButton.textContent = "閉じる ×";
        closeButton.style.position = "absolute";
        closeButton.style.right = "12px";
        closeButton.style.top = "10px";
        closeButton.style.zIndex = "2";
        closeButton.style.padding = "8px 16px";
        closeButton.style.border = "none";
        closeButton.style.borderRadius = "6px";
        closeButton.style.background = "#0b2345";
        closeButton.style.color = "#ffffff";
        closeButton.style.fontSize = "16px";
        closeButton.style.cursor = "pointer";
        closeButton.onclick = function () { overlay.remove(); canvas.focus(); };
        var iframe = document.createElement("iframe");
        iframe.src = url;
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.style.border = "0";
        iframe.style.background = "#ffffff";
        iframe.allow = "fullscreen";
        frameWrap.appendChild(closeButton);
        frameWrap.appendChild(iframe);
        overlay.appendChild(frameWrap);
        document.body.appendChild(overlay);
      };
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          var overlay = document.getElementById("asano-lp-overlay");
          if (overlay) { overlay.remove(); canvas.focus(); }
        }
      });
      // ===== ここまで =====

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/AsanoExpo_Build_TEST.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/AsanoExpo_Build_TEST.data",
        frameworkUrl: buildUrl + "/AsanoExpo_Build_TEST.framework.js",
        codeUrl: buildUrl + "/AsanoExpo_Build_TEST.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Metaverse",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "1280px";
        canvas.style.height = "720px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
              }).catch((message) => {
                alert(message);
              });
            };
      document.body.appendChild(script);
    </script>
  </body>
</html>
